name: Daily SORA refresh (MAS)

# Runs daily at 09:00 Singapore time (01:00 UTC), commits any change.
on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 09:00 SGT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-mas-rates
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install openpyxl

      - name: Decrypt private rates workbook
        # rates.xlsx is NOT in the repo (advisor pricing + BOC contact list).
        # We commit only the AES-encrypted rates.xlsx.enc and decrypt it here using
        # the RATES_XLSX_KEY secret. Without the secret, package rebuild is skipped
        # and only the SORA refresh runs.
        env:
          RATES_XLSX_KEY: ${{ secrets.RATES_XLSX_KEY }}
        run: |
          if [ -n "$RATES_XLSX_KEY" ] && [ -f rates.xlsx.enc ]; then
            mkdir -p Rates
            printf '%s' "$RATES_XLSX_KEY" > /tmp/rk
            openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 -in rates.xlsx.enc -out Rates/rates.xlsx -pass file:/tmp/rk
            rm -f /tmp/rk
            echo "Decrypted Rates/rates.xlsx ($(wc -c < Rates/rates.xlsx) bytes)"
          else
            echo "::warning::RATES_XLSX_KEY not set (or rates.xlsx.enc missing) — skipping package rebuild, SORA refresh only."
          fi

      - name: Fetch SORA from MAS + regenerate feeds
        env:
          # Optional override; defaults to documented MAS endpoint inside the script
          MAS_API_URL: ${{ vars.MAS_API_URL }}
          # Required for authenticated MAS API portal calls. Add at:
          # https://github.com/zetoroz/nexusmortgage.sg/settings/secrets/actions
          MAS_API_KEY: ${{ secrets.MAS_API_KEY }}
          MAS_API_KEY_HEADER: ${{ vars.MAS_API_KEY_HEADER }}
        run: node scripts/fetch-mas-rates.mjs

      - name: Recompute per-package year1Rate using fresh refRates
        # Reads the decrypted Rates/rates.xlsx + overrides refRates from rates.json
        # (just updated). Re-emits rates.json with packages[].year1Rate using live SORA.
        # Skipped if the workbook wasn't decrypted (no RATES_XLSX_KEY secret).
        run: |
          if [ -f Rates/rates.xlsx ]; then
            python3 scripts/convert-rates.py --use-json-refs
          else
            echo "No Rates/rates.xlsx — skipping package rebuild (SORA-only refresh)."
          fi

      - name: Re-regenerate feeds with refreshed packages
        # Second pass writes rates.xml + sora-feed.json from the post-Python rates.json
        # without hitting MAS again (no duplicate history entry).
        run: node scripts/fetch-mas-rates.mjs --feeds-only

      - name: Refresh live-rate snippets in page title + meta description
        # Patches <title> and <meta name="description"> inside LIVE-RATES sentinel
        # blocks on rate-bearing pages, using fresh fixed/SORA numbers from rates.json.
        run: node scripts/update-rate-snippets.mjs

      - name: Stage outputs
        run: |
          git add -A rates.json rates-history.json rates.xml sora-feed.json blog/home-loan-rates-singapore/index.html || true

      - name: Commit + push if changed
        run: |
          if git diff --cached --quiet; then
            echo "No rate changes — nothing to commit."
            exit 0
          fi
          git config user.name  "nexus-rates-bot"
          git config user.email "rates-bot@users.noreply.github.com"
          DATE_SGT=$(TZ=Asia/Singapore date '+%Y-%m-%d')
          git commit -m "chore(rates): daily SORA refresh ${DATE_SGT}"
          git push
